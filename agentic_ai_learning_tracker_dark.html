<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentic AI Learning Tracker</title>
  <style>
    /* ── Dark theme tokens ── */
    :root {
      --bg-primary:    #0f1117;
      --bg-secondary:  #1a1d27;
      --bg-tertiary:   #22263a;
      --border-dim:    #2a2e42;
      --border-mid:    #343856;
      --text-primary:  #e8eaf0;
      --text-secondary:#8b90a8;
      --text-tertiary: #555a75;
      --accent:        #1D9E75;
      --accent-dim:    #133d2e;
      --radius-md:     8px;
      --radius-lg:     12px;

      /* badge colours */
      --done-bg:   #0d3327; --done-fg:   #3ecf9e;
      --active-bg: #0d2240; --active-fg: #5aafff;
      --new-bg:    #2e1f08; --new-fg:    #f0a830;
      --lock-bg:   #1a1d27; --lock-fg:   #555a75;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 99px; }

    /* ── Layout ── */
    .page { padding: 1.5rem 1rem 3rem; max-width: 680px; margin: 0 auto; }

    /* ── Header ── */
    .header-title  { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    .header-sub    { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
    .header-pct    { font-size: 13px; font-weight: 500; color: var(--text-primary); }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: var(--bg-tertiary);
      border-radius: 99px;
      height: 8px;
      margin-top: 10px;
      overflow: hidden;
      flex: 1;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transition: width 0.4s ease;
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 1rem 0 1.5rem;
    }
    .stat {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-dim);
      border-radius: var(--radius-md);
      padding: 14px 12px;
      text-align: center;
    }
    .stat-num   { font-size: 22px; font-weight: 600; color: var(--text-primary); }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      margin: 1.2rem 0 6px;
      padding-left: 2px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Phase card ── */
    .phase {
      border: 0.5px solid var(--border-dim);
      border-radius: var(--radius-lg);
      margin-bottom: 8px;
      overflow: hidden;
      background: var(--bg-secondary);
      transition: border-color 0.2s;
    }
    .phase:hover { border-color: var(--border-mid); }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      cursor: pointer;
      user-select: none;
    }
    .phase-header:hover { background: var(--bg-tertiary); }

    .phase-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .phase-body {
      padding: 0 14px 12px;
      border-top: 0.5px solid var(--border-dim);
    }

    /* ── Task group ── */
    .task-group { margin-top: 10px; }
    .task-group-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    /* ── Task row ── */
    .task {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 0.5px solid var(--border-dim);
      cursor: pointer;
      transition: background 0.1s;
      border-radius: 4px;
    }
    .task:last-child { border-bottom: none; }
    .task:hover { background: rgba(255,255,255,0.03); }

    /* checkbox */
    .task-check {
      width: 15px;
      height: 15px;
      border-radius: 4px;
      border: 1.5px solid var(--border-mid);
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      background: var(--bg-primary);
    }
    .task-check.done {
      background: var(--accent);
      border-color: var(--accent);
    }
    .task-check.done::after {
      content: '';
      display: block;
      width: 4px;
      height: 7px;
      border: 1.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .task-text {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.45;
      flex: 1;
    }
    .task-text.done {
      text-decoration: line-through;
      color: var(--text-tertiary);
    }

    /* ── Mini progress bar ── */
    .mini-bar {
      height: 3px;
      background: var(--bg-tertiary);
      width: 48px;
      border-radius: 99px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .mini-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
    }

    /* ── Meta count ── */
    .meta {
      font-size: 11px;
      color: var(--text-secondary);
      min-width: 30px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Week tag ── */
    .week-tag {
      font-size: 10px;
      color: var(--text-tertiary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Chevron ── */
    .chev { font-size: 10px; color: var(--text-tertiary); flex-shrink: 0; }

    /* ── Status badges ── */
    .sbadge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }
    .s-done   { background: var(--done-bg);   color: var(--done-fg); }
    .s-active { background: var(--active-bg); color: var(--active-fg); }
    .s-new    { background: var(--new-bg);    color: var(--new-fg); }
    .s-locked { background: var(--lock-bg);   color: var(--lock-fg); }

    /* ── sr-only ── */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
    }
  </style>
</head>
<body>
<div class="page">

  <div style="margin-bottom:1rem">
    <div class="header-title">Agentic AI roadmap</div>

      <span class="header-pct" id="main-pct">0%</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-done">0</div><div class="stat-label">done</div></div>
    <div class="stat"><div class="stat-num" id="s-left">0</div><div class="stat-label">remaining</div></div>
    <div class="stat"><div class="stat-num" id="s-phase">0</div><div class="stat-label">phases done</div></div>
  </div>

  <div id="phases-container"></div>
</div>

let checked = {};

function lsGet(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }
function lsSet(k,v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

function load() {
  checked = lsGet(SKEY) || {};
  // seed foundation tasks as done
  ['f1','f2','f3','f4','f5'].forEach(id => { if (checked[id] === undefined) checked[id] = true; });
  render();
  updateStats();
}

function save() { lsSet(SKEY, checked); }

function toggle(id) {
  checked[id] = !checked[id];
  save();
  const el = document.querySelector(`[data-id="${id}"]`);
  if (!el) return;
  el.querySelector('.task-check').classList.toggle('done', checked[id]);
  el.querySelector('.task-text').classList.toggle('done', checked[id]);
  refreshPhaseBar(el.closest('.phase'));
  updateStats();
}

function refreshPhaseBar(phEl) {
  if (!phEl) return;
  const total = phEl.querySelectorAll('.task').length;
  const done  = phEl.querySelectorAll('.task-check.done').length;
  const f = phEl.querySelector('.mini-fill');
  const m = phEl.querySelector('.meta');
  if (f) f.style.width = (total ? Math.round(done / total * 100) : 0) + '%';
  if (m) m.textContent = done + '/' + total;
}

function updateStats() {
  let total = 0, done = 0, phDone = 0;
  phases.forEach(ph => {
    let pt = 0, pd = 0;
    ph.groups.forEach(g => g.tasks.forEach(t => { total++; pt++; if (checked[t.id]) { done++; pd++; } }));
    if (pt && pd === pt) phDone++;
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('main-bar').style.width = pct + '%';
  document.getElementById('main-pct').textContent  = pct + '%';
  document.getElementById('s-done').textContent    = done;
  document.getElementById('s-left').textContent    = total - done;
  document.getElementById('s-phase').textContent   = phDone;
}

function togglePhase(id) {
  const b = document.getElementById('body-' + id);
  const c = document.getElementById('chev-' + id);
  if (!b) return;
  const open = b.style.display !== 'none';
  b.style.display = open ? 'none' : 'block';
  c.textContent   = open ? '▼' : '▲';
}

function badgeHtml(status) {
  if (status === 'done')   return '<span class="sbadge s-done">completed</span>';
  if (status === 'active') return '<span class="sbadge s-active">in progress</span>';
  if (status === 'new')    return '<span class="sbadge s-new">new</span>';
  return '<span class="sbadge s-locked">upcoming</span>';
}

function render() {
  const c = document.getElementById('phases-container');
  c.innerHTML = '';

  const sections = {
    p0:     'Core system (weeks 1–14)',
    p11:    'Advanced mastery (weeks 15–19)',
    pfinal: 'Final project'
  };

  phases.forEach(ph => {
    if (sections[ph.id]) {
      const lbl = document.createElement('div');
      lbl.className   = 'section-label';
      lbl.textContent = sections[ph.id];
      c.appendChild(lbl);
    }

    const allTasks = ph.groups.flatMap(g => g.tasks);
    const total    = allTasks.length;
    const done     = allTasks.filter(t => checked[t.id]).length;
    const isOpen   = ph.status === 'done' || ph.status === 'active';

    const phEl = document.createElement('div');
    phEl.className = 'phase';
    phEl.id = ph.id;

    const groupsHtml = ph.groups.map(g => `
      <div class="task-group">
        <div class="task-group-label">${g.label}</div>
        ${g.tasks.map(t => `
          <div class="task" data-id="${t.id}" onclick="toggle('${t.id}')">
            <div class="task-check ${checked[t.id] ? 'done' : ''}"></div>
            <span class="task-text ${checked[t.id] ? 'done' : ''}">${t.text}</span>
          </div>`).join('')}
      </div>`).join('');

    phEl.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${ph.id}')">
        ${badgeHtml(ph.status)}
        <span class="phase-title">${ph.title}</span>
        <span class="week-tag">${ph.week}</span>
        <div class="mini-bar"><div class="mini-fill" style="width:${total ? Math.round(done / total * 100) : 0}%"></div></div>
        <span class="meta">${done}/${total}</span>
        <span class="chev" id="chev-${ph.id}">${isOpen ? '▲' : '▼'}</span>
      </div>
      <div class="phase-body" id="body-${ph.id}" style="display:${isOpen ? 'block' : 'none'}">${groupsHtml}</div>`;

    c.appendChild(phEl);
  });
}

load();
</script>
</body>
</html>
